<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Single Page App redirect hack for GitHub Pages
      // Store the full URL so index.html can restore it via history.replaceState
      sessionStorage.redirect = window.location.href;
      // Redirect to the root of the react-website subpath
      var l = window.location;
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/react-website/');
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
